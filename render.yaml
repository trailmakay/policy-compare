services:
  - type: cron
    name: email-triage
    runtime: python
    schedule: "0 13 * * *"   # 7:00 AM MDT (UTC-6) every day
    rootDir: email-triage
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-run.sh
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: GMAIL_TOKEN_JSON
        sync: false
